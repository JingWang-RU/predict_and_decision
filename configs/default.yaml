# Default hyperparameter configuration for the UAI-2026 Submission 232
# synthetic benchmark and baseline comparison. All scripts accept CLI
# overrides (see --help); values here match the defaults in the paper
# and the rebuttal tables.

dataset:
  n_tickers: 3000
  n_days: 500                # ~2 trading years
  seed: 0
  overnight_sigma: 0.0085    # tuned so P(|gap| > 3%) ~= 3% under t_4
  gap_threshold: 0.03        # tau
  continuation_prob: 0.08    # P(same-sign intraday | gap) ~= 8%
  continuation_mean: 0.015
  continuation_sigma: 0.02
  normal_intraday_sigma: 0.01
  fm_noise:   [0.010, 0.015, 0.012]   # per-forecaster std-dev
  fm_bias:    [0.000, 0.002, -0.001]  # per-forecaster mean bias

trader:
  eta: 0.01            # OMD learning rate
  lambda_tp: 0.001     # turnover penalty (memory term)
  beta: 1.0            # softmax temperature over FM mean forecast
  top_k: 20            # top-k long positions for oracle baselines

ablations:
  thresholds: [0.01, 0.02, 0.03, 0.05, 0.10]
  encoder_dims: [16, 32, 64, 128]

eval:
  sharpe_freq: 252     # annualization factor for Sharpe
